spring:
  application:
    name: settlr-api

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5        # Render free tier is RAM-constrained
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false               # Turn off in prod — saves CPU + log noise
    open-in-view: false           # Avoids lazy-load issues and frees threads
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false         # Only needed when show-sql is true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  data:
    redis:
      host: ${SPRING_REDIS_HOST}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 2000ms

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    root: WARN                        # Silence everything by default
    com.settlr: INFO                  # Your app logs only
    org.springframework.security: WARN
    org.hibernate.SQL: WARN           # Silence SQL in prod
    org.hibernate.orm.jdbc.bind: WARN