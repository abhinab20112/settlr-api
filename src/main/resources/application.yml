spring:
  application:
    name: settlr-api

  # ── PostgreSQL DataSource ──────────────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartsplit}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:harsh}
    driver-class-name: org.postgresql.Driver

  # ── JPA / Hibernate ───────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update       # update: evolves schema without dropping data. Use validate in prod.
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Jackson ───────────────────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false   # Instant → "2026-04-29T09:00:00Z" not epoch millis
    time-zone: UTC                       # all dates in responses use UTC

  # ── Redis ─────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 2000ms          # connection timeout
      # password: ${SPRING_REDIS_PASSWORD:} # uncomment if Redis auth is enabled

# ── JWT ───────────────────────────────────────────────────────────────────────
# Secret MUST be Base64-encoded and decode to at least 32 bytes (256 bits) for HS256.
# Replace this with a strong random secret before deploying to production.
app:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLXNldHRsci1hcGktZG9ub3QtdXNlLWluLXByb2R1Y3Rpb24=}
    expiration-ms: 86400000    # 24 hours in milliseconds

# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: always        # show exception messages in error responses
    include-binding-errors: always # show field-level validation errors

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.settlr: INFO                          # your app — INFO and above
    org.springframework.security: WARN        # Spring Security — warnings only
    org.hibernate.SQL: DEBUG                  # show SQL queries in terminal
    org.hibernate.orm.jdbc.bind: TRACE        # show bound SQL parameter values

# ── Groq API Integration ──────────────────────────────────────────────────────
groq:
  api-key: ${GROQ_API_KEY}
  base-url: https://api.groq.com/openai/v1
  model: openai/gpt-oss-20b
  timeout: 10
